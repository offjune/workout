<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Treino Upper/Lower</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
        }
        .day-container {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .day-container h2 {
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
            margin-top: 0;
        }
        .exercise {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .exercise:last-child {
            border-bottom: none;
        }
        .exercise-name {
            flex: 2;
            font-weight: bold;
        }
        .inputs {
            flex: 3;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        input[type="text"] {
            width: 80px;
            padding: 5px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #2c2c2c;
            color: white;
            text-align: center;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .notification {
            text-align: center;
            color: #4CAF50;
            font-weight: bold;
            height: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Progresso de Treino (4-6 Reps)</h1>

    <div id="workout-plan">
        </div>

    <button onclick="saveData()">💾 Salvar Meus Pesos e Descansos</button>
    <div id="notification" class="notification"></div>

    <script>
        // Estrutura do treino baseada na sua planilha
        const workoutPlan = [
            {
                day: "Segunda-Feira (Superior A)",
                exercises: [
                    "Supino Reto com Barra (Peito)",
                    "Remada Curvada (Costas)",
                    "Desenvolvimento Halteres (Ombro)",
                    "Rosca Direta + Tríceps Testa (Braços)"
                ]
            },
            {
                day: "Terça-Feira (Inferior A)",
                exercises: [
                    "Agachamento Livre (Quadríceps/Glúteo)",
                    "Stiff (Posterior)",
                    "Elevação Pélvica (Glúteo)",
                    "Gêmeos em Pé (Panturrilha)"
                ]
            },
            {
                day: "Quinta-Feira (Superior B)",
                exercises: [
                    "Puxada Alta (Costas)",
                    "Supino Inclinado (Peito)",
                    "Elevação Lateral (Ombros)",
                    "Tríceps Pulley + Rosca Martelo (Braços)"
                ]
            },
            {
                day: "Sexta-Feira (Inferior B)",
                exercises: [
                    "Levantamento Terra Sumô (Posterior/Glúteo)",
                    "Leg Press 45° (Quadríceps)",
                    "Cadeira Abdutora (Glúteos)",
                    "Gêmeos Sentado (Panturrilha)"
                ]
            },
            {
                day: "Sábado (Isolados - Peito e Glúteos)",
                exercises: [
                    "Crucifixo Reto com Halteres (Peito)",
                    "Crossover na Polia (Peito)",
                    "Glúteo na Polia / Coice (Glúteo)",
                    "Elevação Pélvica Unilateral (Glúteo)"
                ]
            }
        ];

        const container = document.getElementById('workout-plan');

        // Função para gerar o HTML do treino
        function renderWorkout() {
            workoutPlan.forEach((workout, dayIndex) => {
                let dayDiv = document.createElement('div');
                dayDiv.className = 'day-container';
                
                let title = document.createElement('h2');
                title.innerText = workout.day;
                dayDiv.appendChild(title);

                workout.exercises.forEach((exercise, exIndex) => {
                    let exDiv = document.createElement('div');
                    exDiv.className = 'exercise';
                    
                    let idPrefix = `day${dayIndex}_ex${exIndex}`;
                    
                    exDiv.innerHTML = `
                        <div class="exercise-name">${exercise} <br><small>4 séries | 4-6 reps</small></div>
                        <div class="inputs">
                            <input type="text" id="${idPrefix}_weight" placeholder="Ex: 50kg" title="Carga">
                            <input type="text" id="${idPrefix}_rest" placeholder="Ex: 2 min" title="Descanso">
                        </div>
                    `;
                    dayDiv.appendChild(exDiv);
                });
                container.appendChild(dayDiv);
            });
            loadData();
        }

        // Função para salvar os dados na "memória" do navegador (localStorage)
        function saveData() {
            workoutPlan.forEach((workout, dayIndex) => {
                workout.exercises.forEach((exercise, exIndex) => {
                    let idPrefix = `day${dayIndex}_ex${exIndex}`;
                    let weight = document.getElementById(`${idPrefix}_weight`).value;
                    let rest = document.getElementById(`${idPrefix}_rest`).value;
                    
                    localStorage.setItem(`${idPrefix}_weight`, weight);
                    localStorage.setItem(`${idPrefix}_rest`, rest);
                });
            });
            
            const notif = document.getElementById('notification');
            notif.innerText = "Treino salvo com sucesso! 💪";
            setTimeout(() => { notif.innerText = ""; }, 3000);
        }

        // Função para carregar os dados salvos quando a página abre
        function loadData() {
            workoutPlan.forEach((workout, dayIndex) => {
                workout.exercises.forEach((exercise, exIndex) => {
                    let idPrefix = `day${dayIndex}_ex${exIndex}`;
                    
                    let savedWeight = localStorage.getItem(`${idPrefix}_weight`);
                    let savedRest = localStorage.getItem(`${idPrefix}_rest`);
                    
                    if (savedWeight) document.getElementById(`${idPrefix}_weight`).value = savedWeight;
                    if (savedRest) document.getElementById(`${idPrefix}_rest`).value = savedRest;
                });
            });
        }

        // Inicializa o app
        renderWorkout();
    </script>
</body>
</html>
